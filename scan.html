<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sehat — Patient Health Card</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070d0a;--green:#00c97a;--green-dim:#004d2e;--white:#edf5f0;--muted:#4a6a5a;--cb:#101e16;--cborder:#1a2e22;--red:#e05252}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(7,13,10,0.95);border-bottom:1px solid var(--cborder);position:sticky;top:0;z-index:99}
.logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--green);text-decoration:none}
.nav-links{display:flex;gap:1.5rem}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.85rem;transition:color 0.2s}
.nav-links a:hover{color:var(--green)}

.main{max-width:600px;margin:0 auto;padding:2rem 1.5rem}

.emergency-banner{background:linear-gradient(135deg,#1f0606,#120404);border:1px solid #5a1212;border-radius:16px;padding:1rem 1.5rem;display:flex;align-items:center;gap:0.8rem;margin-bottom:1.5rem}
.e-dot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:blink 1s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.e-banner-text{font-size:0.8rem;color:#f08080;line-height:1.4}
.e-banner-text strong{color:var(--red);font-weight:700}

.id-card-large{width:100%;border-radius:20px;background:linear-gradient(135deg,#0d2419,#071509);border:1px solid var(--green-dim);position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,201,122,0.15),0 20px 50px rgba(0,0,0,0.6);margin-bottom:1.5rem;padding:1.5rem}
.card-top-stripe{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.card-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.card-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--green);position:absolute;top:14px;right:16px}
.big-avatar{width:60px;height:60px;border-radius:50%;background:var(--green-dim);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--green);flex-shrink:0}
.card-name-block .patient-full-name{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--white)}
.card-name-block .patient-id{font-size:0.65rem;color:var(--muted);font-family:monospace;margin-top:3px}
.card-name-block .patient-meta{font-size:0.8rem;color:var(--muted);margin-top:3px}

.critical-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1rem}
.c-block{background:rgba(0,0,0,0.3);border-radius:12px;padding:1rem}
.c-block.full{grid-column:span 2}
.c-block.danger{background:rgba(224,82,82,0.08);border:1px solid rgba(224,82,82,0.15)}
.c-block.safe{background:rgba(0,201,122,0.06);border:1px solid rgba(0,201,122,0.1)}
.c-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:0.4rem}
.c-value{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--white)}
.c-value.red{color:var(--red)}
.c-value.green{color:var(--green)}
.c-value.normal{font-size:0.9rem;font-weight:500;font-family:'DM Sans',sans-serif}

.more-section{background:var(--cb);border:1px solid var(--cborder);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
.more-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1rem}
.more-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.m-item{border-bottom:1px solid var(--cborder);padding-bottom:0.7rem}
.m-item.full{grid-column:span 2}
.m-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:0.3rem}
.m-value{font-size:0.88rem;color:var(--white);font-weight:500;line-height:1.4}

.no-data{text-align:center;padding:4rem 2rem}
.no-data-icon{font-size:3rem;margin-bottom:1rem;opacity:0.4}
.no-data h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:0.5rem}
.no-data p{color:var(--muted);font-size:0.9rem;margin-bottom:1.5rem}
.manual-section{background:var(--cb);border:1px solid var(--cborder);border-radius:16px;padding:1.5rem;text-align:left}
.manual-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:0.7rem;display:block}
.manual-row{display:flex;gap:0.8rem}
.manual-input{flex:1;background:#0d1a12;border:1px solid var(--cborder);border-radius:10px;padding:0.7rem 1rem;color:var(--white);font-family:monospace;font-size:0.85rem;outline:none;transition:border-color 0.2s}
.manual-input:focus{border-color:var(--green)}
.btn-lookup{background:var(--green);color:#000;border:none;border-radius:10px;padding:0.7rem 1.2rem;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer}

.action-bar{display:flex;gap:0.8rem;flex-wrap:wrap}
.btn-action{flex:1;min-width:120px;padding:0.8rem;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;border:none;transition:all 0.2s;text-align:center;text-decoration:none;display:block}
.btn-green{background:var(--green);color:#000}
.btn-green:hover{opacity:0.85}
.btn-outline{background:transparent;border:1px solid var(--cborder)!important;color:var(--muted)}
.btn-outline:hover{border-color:var(--green)!important;color:var(--green)}

.reg-tag{font-size:0.65rem;color:var(--muted);text-align:center;margin-top:0.8rem}

@media(max-width:500px){
  .critical-grid{grid-template-columns:1fr}
  .c-block.full{grid-column:span 1}
  .more-grid{grid-template-columns:1fr}
  .m-item.full{grid-column:span 1}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sehat.</a>
  <div class="nav-links">
    <a href="register.html">Register</a>
    <a href="dashboard.html">Dashboard</a>
  </div>
</nav>

<div class="main" id="mainContent">
  <!-- Filled by JS -->
</div>

<script>
function getInitials(n){return(n||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}

function isEmpty(v){return!v||v.trim()===''||v.trim().toLowerCase()==='none'||v.trim().toLowerCase()==='not provided'}

function renderCard(p){
  const main=document.getElementById('mainContent');
  const hasAllergy=!isEmpty(p.allergies)&&p.allergies.toLowerCase()!=='none';
  const hasMeds=!isEmpty(p.meds)&&p.meds.toLowerCase()!=='none';
  const hasConditions=!isEmpty(p.conditions)&&p.conditions.toLowerCase()!=='none';

  main.innerHTML=`
    <div class="emergency-banner">
      <div class="e-dot"></div>
      <div class="e-banner-text"><strong>Emergency Access Active</strong> — All critical medical data is shown below. No authentication required.</div>
    </div>

    <div class="id-card-large">
      <div class="card-top-stripe"></div>
      <div class="card-logo-text">Sehat.</div>

      <div class="card-header">
        <div class="big-avatar">${getInitials(p.name)}</div>
        <div class="card-name-block">
          <div class="patient-full-name">${p.name||'Unknown'}</div>
          <div class="patient-id">${p.id||'SHT-UNKNOWN'}</div>
          <div class="patient-meta">${p.age?p.age+' yrs':''} ${p.gender?'· '+p.gender:''} ${p.district?'· '+p.district:''}</div>
        </div>
      </div>

      <div class="critical-grid">
        <div class="c-block danger">
          <div class="c-label">Blood Group</div>
          <div class="c-value red">${p.blood||'Unknown'}</div>
        </div>
        <div class="c-block">
          <div class="c-label">Age</div>
          <div class="c-value">${p.age?p.age+' yrs':'Unknown'}</div>
        </div>
        <div class="c-block full ${hasAllergy?'danger':''}">
          <div class="c-label">⚠ Known Allergies</div>
          <div class="c-value ${hasAllergy?'red':'normal'}">${p.allergies||'None known'}</div>
        </div>
        <div class="c-block full ${hasMeds?'':''}">
          <div class="c-label">💊 Current Medications</div>
          <div class="c-value normal">${p.meds||'None'}</div>
        </div>
        <div class="c-block full ${hasConditions?'danger':''}">
          <div class="c-label">🏥 Medical Conditions</div>
          <div class="c-value normal">${p.conditions||'None'}</div>
        </div>
        <div class="c-block full safe">
          <div class="c-label">📞 Emergency Contact</div>
          <div class="c-value green normal">${p.emergency||'Not provided'}</div>
        </div>
      </div>
    </div>

    <div class="more-section">
      <div class="more-title">Full Patient Record</div>
      <div class="more-grid">
        <div class="m-item"><div class="m-label">Full Name</div><div class="m-value">${p.name||'—'}</div></div>
        <div class="m-item"><div class="m-label">Gender</div><div class="m-value">${p.gender||'—'}</div></div>
        <div class="m-item"><div class="m-label">Blood Group</div><div class="m-value">${p.blood||'—'}</div></div>
        <div class="m-item"><div class="m-label">Age</div><div class="m-value">${p.age?p.age+' years':'—'}</div></div>
        <div class="m-item full"><div class="m-label">District / State</div><div class="m-value">${p.district||'—'}</div></div>
        <div class="m-item full"><div class="m-label">Allergies</div><div class="m-value">${p.allergies||'None'}</div></div>
        <div class="m-item full"><div class="m-label">Medications</div><div class="m-value">${p.meds||'None'}</div></div>
        <div class="m-item full"><div class="m-label">Medical Conditions</div><div class="m-value">${p.conditions||'None'}</div></div>
        <div class="m-item full"><div class="m-label">Emergency Contact</div><div class="m-value">${p.emergency||'Not provided'}</div></div>
        <div class="m-item"><div class="m-label">Sehat ID</div><div class="m-value" style="font-family:monospace;font-size:0.75rem">${p.id||'—'}</div></div>
        <div class="m-item"><div class="m-label">Registered</div><div class="m-value">${p.date||'—'}</div></div>
      </div>
    </div>

    <div class="action-bar">
      <a href="register.html" class="btn-action btn-outline">+ Register New Patient</a>
      <a href="dashboard.html" class="btn-action btn-green">Open Dashboard →</a>
    </div>
    <p class="reg-tag">Powered by Sehat Digital Health · ABHA Compatible · rudi-rock.github.io/Sehat</p>
  `;

  const logs=JSON.parse(localStorage.getItem('sehat_access_logs')||'[]');
  logs.push({patientId:p.id,type:'Emergency (QR Scan)',time:new Date().toLocaleString('en-IN'),accessor:'Doctor (QR Scan)'});
  localStorage.setItem('sehat_access_logs',JSON.stringify(logs));
}

function renderNoData(){
  document.getElementById('mainContent').innerHTML=`
    <div class="no-data">
      <div class="no-data-icon">🪪</div>
      <h2>No Patient Data Found</h2>
      <p>This QR code doesn't contain patient data, or it may be invalid. Enter a Sehat ID manually below.</p>
      <div class="manual-section">
        <span class="manual-label">Enter Sehat Health ID</span>
        <div class="manual-row">
          <input type="text" class="manual-input" id="manualId" placeholder="SHT-2024-MH-XXXXX" oninput="this.value=this.value.toUpperCase()"/>
          <button class="btn-lookup" onclick="lookupManual()">Look up →</button>
        </div>
      </div>
    </div>
  `;
}

function lookupManual(){
  const id=document.getElementById('manualId').value.trim().toUpperCase();
  const pts=JSON.parse(localStorage.getItem('sehat_patients')||'{}');
  if(pts[id]){renderCard(pts[id]);}
  else{alert('Patient not found. Please register first.');}
}

const params=new URLSearchParams(window.location.search);
const pid=params.get('id');

if(pid){
  const p={
    id:pid,
    name:params.get('name')||'',
    age:params.get('age')||'',
    gender:params.get('gender')||'',
    blood:params.get('blood')||'',
    district:params.get('district')||'',
    allergies:params.get('allergies')||'None',
    emergency:params.get('emergency')||'Not provided',
    meds:params.get('meds')||'None',
    conditions:params.get('conditions')||'None',
    date:params.get('date')||''
  };
  renderCard(p);
} else {
  renderNoData();
}
</script>
</body>
</html>
